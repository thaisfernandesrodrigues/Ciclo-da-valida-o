<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 Ciclo da Validação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- tela inicial -->
    <div class="tela-inicial">
        
        <!-- morango gigante que flutua (novo conceito relembrado) -->
        <div class="morango-gigante">
            🍓
        </div>
        
        <!-- título principal -->
        <h1 class="titulo-principal">
            Ciclo da <span class="destaque">Validação</span>
        </h1>
        
        <!-- subtítulo -->
        <p class="subtitulo-inicial">
            Ajude o moranguinho a ser validado! 🌟
        </p>
        
        <!-- descrição do que é o jogo -->
        <div class="descricao">
            <p>
                Nesta simulação, uma ideia (o moranguinho) vai andar pela tela 
                representando o processo de validação. 🍓
            </p>
            <p>
                A ideia se move sozinha, mostrando que mesmo sem interação, 
                o processo de validação continua acontecendo.
            </p>
        </div>
        
        <!-- botão para ir ao jogo -->
        <a href="jogo.html" class="btn-iniciar">
            🍓 Ver a simulação
        </a>
        
        <!-- decorações das ideias do pinterest -->
        <div class="decoracao-1">🌸</div>
        <div class="decoracao-2">🍰</div>
        <div class="decoracao-3">🧁</div>
        <div class="decoracao-4">✨</div>
        
    </div>
    
</body>
</html>
